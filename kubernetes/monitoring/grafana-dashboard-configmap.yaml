apiVersion: v1
kind: ConfigMap
metadata:
  name: dagster-grafana-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"   # Grafana sidecar picks this up automatically
data:
  dagster-overview.json: |
    {
      "__inputs": [],
      "__requires": [
        {"type": "grafana", "id": "grafana", "name": "Grafana", "version": "10.0.0"},
        {"type": "datasource", "id": "prometheus", "name": "Prometheus", "version": "1.0.0"}
      ],
      "annotations": {"list": []},
      "description": "Hydrosat Dagster Platform — Pipeline Observability",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "id": 1,
          "title": "Pipeline Success Rate (1h)",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": 0},
                  {"color": "yellow", "value": 0.9},
                  {"color": "green", "value": 0.95}
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "dagster:job_success_rate:1h",
              "legendFormat": "Success Rate"
            }
          ]
        },
        {
          "id": 2,
          "title": "Active Runs",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": 0},
                  {"color": "yellow", "value": 10},
                  {"color": "red", "value": 20}
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "dagster_in_progress_runs_total",
              "legendFormat": "Active Runs"
            }
          ]
        },
        {
          "id": 3,
          "title": "Total Runs (24h)",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0},
          "fieldConfig": {"defaults": {"unit": "short"}},
          "targets": [
            {
              "expr": "increase(dagster_run_success_total[24h]) + increase(dagster_run_failure_total[24h])",
              "legendFormat": "Total Runs"
            }
          ]
        },
        {
          "id": 4,
          "title": "Daemon Heartbeat Age (s)",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0},
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": 0},
                  {"color": "yellow", "value": 60},
                  {"color": "red", "value": 300}
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "time() - dagster_daemon_heartbeat_timestamp_seconds",
              "legendFormat": "Heartbeat Age"
            }
          ]
        },
        {
          "id": 5,
          "title": "Run Success vs Failure Rate (5m)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
          "fieldConfig": {"defaults": {"unit": "reqps"}},
          "targets": [
            {
              "expr": "rate(dagster_run_success_total[5m])",
              "legendFormat": "Success"
            },
            {
              "expr": "rate(dagster_run_failure_total[5m])",
              "legendFormat": "Failure"
            }
          ]
        },
        {
          "id": 6,
          "title": "Asset Processing Duration (p50/p95)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
          "fieldConfig": {"defaults": {"unit": "s"}},
          "targets": [
            {
              "expr": "histogram_quantile(0.50, rate(hydrosat_asset_processing_duration_seconds_bucket[5m]))",
              "legendFormat": "p50 - {{ asset_name }}"
            },
            {
              "expr": "histogram_quantile(0.95, rate(hydrosat_asset_processing_duration_seconds_bucket[5m]))",
              "legendFormat": "p95 - {{ asset_name }}"
            }
          ]
        },
        {
          "id": 7,
          "title": "Records Processed Rate (5m)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12},
          "fieldConfig": {"defaults": {"unit": "reqps"}},
          "targets": [
            {
              "expr": "rate(hydrosat_records_processed_total{status='success'}[5m])",
              "legendFormat": "{{ asset_name }}"
            }
          ]
        },
        {
          "id": 8,
          "title": "Data Quality Score",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12},
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1
            }
          },
          "targets": [
            {
              "expr": "hydrosat_data_quality_score",
              "legendFormat": "{{ asset_name }}"
            }
          ]
        },
        {
          "id": 9,
          "title": "Queued Runs",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 20},
          "fieldConfig": {"defaults": {"unit": "short"}},
          "targets": [
            {
              "expr": "dagster_queued_runs_total",
              "legendFormat": "Queued Runs"
            }
          ]
        },
        {
          "id": 10,
          "title": "Worker Node Pod Count",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 20},
          "fieldConfig": {"defaults": {"unit": "short"}},
          "targets": [
            {
              "expr": "count(kube_pod_info{namespace='dagster', node=~'.*worker.*'})",
              "legendFormat": "Dagster Run Pods"
            }
          ]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": ["dagster", "hydrosat", "data-platform"],
      "templating": {"list": []},
      "time": {"from": "now-6h", "to": "now"},
      "timepicker": {},
      "timezone": "UTC",
      "title": "Dagster Platform — Hydrosat",
      "uid": "hydrosat-dagster-overview",
      "version": 1
    }
