---
apiVersion: v1
kind: Namespace
metadata:
  name: dagster
  labels:
    app.kubernetes.io/managed-by: terraform
    monitoring: enabled
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    app.kubernetes.io/managed-by: terraform
    pod-security.kubernetes.io/enforce: baseline
    kubernetes.io/metadata.name: monitoring   # required by NetworkPolicy namespaceSelector
