# ─────────────────────────────────────────────────────────────────────────────
# CD: Deploy Infrastructure (Terraform Apply)
#
# Triggers:
#   - Push to main (after PR merge) — auto-applies if plan shows changes
#   - Manual workflow_dispatch — for targeted environment deployments
#
# Requires approval gate for the "production" environment configured in
# GitHub → Settings → Environments → production → Required reviewers.
# ─────────────────────────────────────────────────────────────────────────────

name: "CD — Deploy Infrastructure"

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/deploy-infra.yml"

  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "prod"
        type: choice
        options: [prod, staging, dev]
      terraform_action:
        description: "Terraform action"
        required: true
        default: "apply"
        type: choice
        options: [apply, destroy]
      confirm_destroy:
        description: "Type 'destroy' to confirm destroy action"
        required: false
        default: ""

permissions:
  id-token: write
  contents: read
  deployments: write

env:
  TF_VERSION: "1.7.5"
  AWS_REGION: ${{ secrets.AWS_REGION }}
  TF_IN_AUTOMATION: "true"
  TF_CLI_ARGS: "-no-color"
  ENVIRONMENT: ${{ github.event.inputs.environment || 'prod' }}

jobs:
  # ── Safety check for destroy ───────────────────────────────────────────────
  validate-inputs:
    name: Validate Inputs
    runs-on: ubuntu-latest
    steps:
      - name: Validate destroy confirmation
        if: github.event.inputs.terraform_action == 'destroy'
        run: |
          if [[ "${{ github.event.inputs.confirm_destroy }}" != "destroy" ]]; then
            echo "::error::Destroy action requires confirm_destroy='destroy'. Aborting."
            exit 1
          fi
          echo "::warning::DESTROY action confirmed for ${{ env.ENVIRONMENT }} — proceeding."

  terraform-apply:
    name: "Terraform ${{ github.event.inputs.terraform_action || 'apply' }} (${{ github.event.inputs.environment || 'prod' }})"
    runs-on: ubuntu-latest
    needs: validate-inputs
    environment: ${{ (github.event_name == 'push' || github.event.inputs.environment == 'prod') && 'production' || github.event.inputs.environment || 'dev' }}
    defaults:
      run:
        working-directory: terraform
    concurrency:
      group: terraform-${{ github.event.inputs.environment || 'prod' }}
      cancel-in-progress: false   # Never cancel an in-flight apply
    outputs:
      plan_exitcode: ${{ steps.plan.outputs.exitcode }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── OIDC auth ──────────────────────────────────────────────────────────
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-tf-apply-${{ github.run_id }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=dagster-platform/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=hydrosat-terraform-locks"

      # ── Create tfvars from secrets ─────────────────────────────────────────
      - name: Write terraform.tfvars
        run: |
          cat > terraform.tfvars <<EOF
          aws_region                = "${{ env.AWS_REGION }}"
          environment               = "${{ env.ENVIRONMENT }}"
          project                   = "hydrosat"
          cluster_name              = "hydrosat-dagster"
          slack_webhook_url         = "${{ secrets.SLACK_WEBHOOK_URL }}"
          alert_email               = "${{ secrets.ALERT_EMAIL }}"
          EOF

      # ── Plan ──────────────────────────────────────────────────────────────
      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file="terraform.tfvars" \
            -out=tfplan \
            -detailed-exitcode
        continue-on-error: true

      # ── Apply ─────────────────────────────────────────────────────────────
      - name: Terraform Apply
        if: |
          steps.plan.outputs.exitcode == '2' &&
          (github.event.inputs.terraform_action != 'destroy')
        run: terraform apply -auto-approve tfplan

      # ── Destroy (manual only, with confirmation) ───────────────────────────
      - name: Terraform Destroy
        if: github.event.inputs.terraform_action == 'destroy'
        run: terraform destroy -var-file="terraform.tfvars" -auto-approve

      # ── Emit outputs to GITHUB_OUTPUT for downstream workflows ─────────────
      - name: Export Terraform Outputs
        if: steps.plan.outputs.exitcode == '2' || steps.plan.outputs.exitcode == '0'
        run: |
          echo "cluster_name=$(terraform output -raw cluster_name 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"
          echo "rds_endpoint=$(terraform output -raw rds_endpoint 2>/dev/null || echo '')"  >> "$GITHUB_OUTPUT"

      # ── Grant GitHub Actions role EKS access ───────────────────────────────
      # The cluster may be in CONFIG_MAP auth mode. Enable API mode and create
      # an access entry for the current GitHub Actions role so kubectl works.
      - name: Grant EKS access to GitHub Actions role
        if: github.event.inputs.terraform_action != 'destroy'
        run: |
          CLUSTER=$(terraform output -raw cluster_name 2>/dev/null || echo "hydrosat-dagster")
          ROLE_ARN="${{ secrets.AWS_ROLE_ARN }}"

          # Enable API_AND_CONFIG_MAP auth mode (idempotent)
          CURRENT_MODE=$(aws eks describe-cluster --name "${CLUSTER}" \
            --region "${{ env.AWS_REGION }}" \
            --query 'cluster.accessConfig.authenticationMode' --output text)
          if [[ "${CURRENT_MODE}" == "CONFIG_MAP" ]]; then
            aws eks update-cluster-config --name "${CLUSTER}" \
              --region "${{ env.AWS_REGION }}" \
              --access-config authenticationMode=API_AND_CONFIG_MAP
            # Wait for update to complete
            sleep 30
          fi

          # Create access entry (ignore error if already exists)
          aws eks create-access-entry \
            --cluster-name "${CLUSTER}" \
            --principal-arn "${ROLE_ARN}" \
            --region "${{ env.AWS_REGION }}" 2>/dev/null || true

          # Associate cluster admin policy
          aws eks associate-access-policy \
            --cluster-name "${CLUSTER}" \
            --principal-arn "${ROLE_ARN}" \
            --policy-arn arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy \
            --access-scope type=cluster \
            --region "${{ env.AWS_REGION }}" 2>/dev/null || true

      # ── Update kubeconfig ──────────────────────────────────────────────────
      - name: Update kubeconfig
        if: github.event.inputs.terraform_action != 'destroy'
        run: |
          CLUSTER=$(terraform output -raw cluster_name 2>/dev/null || echo "hydrosat-dagster")
          aws eks update-kubeconfig --region "${{ env.AWS_REGION }}" --name "${CLUSTER}"
          kubectl get nodes -o wide

      # ── Slack notification ─────────────────────────────────────────────────
      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "$STATUS" = "success" ]; then
            TEXT="✅ *Terraform apply succeeded* — \`${{ env.ENVIRONMENT }}\`"
            COLOR="good"
          else
            TEXT="❌ *Terraform apply FAILED* — \`${{ env.ENVIRONMENT }}\`"
            COLOR="danger"
          fi
          curl -s -X POST "$SLACK_WEBHOOK" \
            -H 'Content-type: application/json' \
            --data "{\"attachments\":[{\"color\":\"$COLOR\",\"text\":\"$TEXT\",\"fields\":[{\"title\":\"Run\",\"value\":\"<$RUN_URL|${{ github.run_id }}>\",\"short\":true},{\"title\":\"Triggered by\",\"value\":\"${{ github.actor }}\",\"short\":true}]}]}" \
            || true  # Non-fatal: missing or placeholder webhook URL should not fail the pipeline

  # ── Deploy application after infra apply ───────────────────────────────────
  # Uses workflow_call (no PAT required) — deploy-app.yml declares workflow_call trigger.
  # Runs whenever terraform-apply succeeds and it is not a destroy action.
  # plan_exitcode '0' (no changes) and '2' (changes applied) both proceed —
  # infra may already exist when re-deploying the application only.
  deploy-app:
    name: Deploy Application
    needs: terraform-apply
    if: |
      needs.terraform-apply.result == 'success' &&
      github.event.inputs.terraform_action != 'destroy'
    uses: ./.github/workflows/deploy-app.yml
    with:
      environment: ${{ github.event.inputs.environment || 'prod' }}
    secrets: inherit
